<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archiveat - Pink Book Edition</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,800;1,800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FFF5F7;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #FDA4AF;
            border-radius: 10px;
        }

        .perspective-1000 {
            perspective: 1000px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        /* Book Spine Gradient */
        .book-spine {
            background: linear-gradient(to right, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0) 100%);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Icon Component Wrapper for Lucide
        const Icon = ({ name, size = 20, color = "currentColor", className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size, color: color }} className={className}></i>;
        };

        const App = () => {
            const [recipes, setRecipes] = useState([]);
            const [view, setView] = useState('home');
            const [selectedRecipe, setSelectedRecipe] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [statusMessage, setStatusMessage] = useState(null);
            const [isGeneratingImage, setIsGeneratingImage] = useState(false);

            const logoUrl = "https://res.cloudinary.com/dfbkph06k/image/upload/v1772528244/Dessert_chef_logo_with_pastry_delights_rdrof0.png";
            const apiKey = ""; // Diset otomatis oleh environment

            const [formData, setFormData] = useState({
                title: '',
                ingredients: '',
                steps: '',
                category: 'Dessert',
                prepTime: '',
                imageUrl: '',
                referenceUrl: '',
                budget: ''
            });

            const showMessage = (text, type = 'info') => {
                setStatusMessage({ text, type });
                setTimeout(() => setStatusMessage(null), 3000);
            };

            const formatIDR = (amount) => {
                if (!amount) return "Rp 0";
                return new Intl.NumberFormat('id-ID', {
                    style: 'currency',
                    currency: 'IDR',
                    maximumFractionDigits: 0
                }).format(amount);
            };

            const handleSaveRecipe = (e) => {
                e.preventDefault();
                if (!formData.title || !formData.ingredients || !formData.steps) {
                    showMessage("Mohon lengkapi resepnya ya, Chef!", "error");
                    return;
                }
                const newRecipe = {
                    ...formData,
                    id: Date.now(),
                    createdAt: new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' })
                };
                setRecipes([newRecipe, ...recipes]);
                setFormData({ title: '', ingredients: '', steps: '', category: 'Dessert', prepTime: '', imageUrl: '', referenceUrl: '', budget: '' });
                setView('home');
                showMessage("Resep manis berhasil disimpan!", "success");
            };

            const generateImage = async () => {
                if (!formData.title) {
                    showMessage("Tulis judulnya dulu ya!", "error");
                    return;
                }
                setIsGeneratingImage(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            instances: { prompt: `Kawaii aesthetic food photography of ${formData.title}, pink pastel theme, soft lighting, professional dessert styling` },
                            parameters: { sampleCount: 1 }
                        })
                    });
                    const result = await response.json();
                    if (result.predictions?.[0]) {
                        setFormData({ ...formData, imageUrl: `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}` });
                        showMessage("Gambar cantik berhasil dibuat!", "success");
                    }
                } catch (err) {
                    showMessage("Gagal membuat gambar AI.", "error");
                } finally {
                    setIsGeneratingImage(false);
                }
            };

            const filteredRecipes = recipes.filter(r => 
                r.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                r.category.toLowerCase().includes(searchQuery.toLowerCase())
            );

            return (
                <div className="min-h-screen pb-20">
                    {/* Toast Notification */}
                    {statusMessage && (
                        <div className={`fixed bottom-10 left-1/2 -translate-x-1/2 z-50 px-8 py-4 rounded-full shadow-2xl animate-bounce border flex items-center gap-3 font-bold ${statusMessage.type === 'error' ? 'bg-rose-500 text-white border-rose-400' : 'bg-pink-600 text-white border-pink-400'}`}>
                            <Icon name="heart" size={18} />
                            {statusMessage.text}
                        </div>
                    )}

                    {/* Navigation */}
                    <nav className="bg-white/80 backdrop-blur-md border-b border-pink-100 sticky top-0 z-40">
                        <div className="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-4 cursor-pointer group" onClick={() => setView('home')}>
                                <div className="w-14 h-14 bg-white rounded-2xl overflow-hidden shadow-lg shadow-pink-200 group-hover:scale-105 transition-all border border-pink-100 flex items-center justify-center">
                                    <img src={logoUrl} alt="Chef Logo" className="w-full h-full object-cover" />
                                </div>
                                <div className="hidden sm:block">
                                    <h1 className="text-xl font-black tracking-tighter text-rose-600 uppercase">PINK<span className="text-pink-400">BOOK</span></h1>
                                    <p className="text-[9px] uppercase tracking-[0.2em] font-black text-pink-300 italic">Chef's Secret Archive</p>
                                </div>
                            </div>
                            
                            {view === 'home' && (
                                <button onClick={() => setView('add')} className="bg-rose-500 hover:bg-rose-600 text-white px-6 py-3 rounded-full flex items-center gap-2 transition-all shadow-lg active:scale-95 font-bold text-sm">
                                    <Icon name="plus" size={18} />
                                    <span>Tambah Resep</span>
                                </button>
                            )}

                            {(view === 'add' || view === 'detail') && (
                                <button onClick={() => setView('home')} className="text-pink-500 hover:text-rose-600 flex items-center gap-2 font-bold text-sm bg-pink-50 px-5 py-2.5 rounded-full border border-pink-100">
                                    <Icon name="chevron-left" size={18} />
                                    Beranda
                                </button>
                            )}
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto px-6 mt-10">
                        {/* VIEW: HOME */}
                        {view === 'home' && (
                            <div className="space-y-12 animate-fade-in">
                                <header className="bg-white p-10 rounded-[3rem] border border-pink-50 shadow-sm flex flex-col md:flex-row items-center justify-between gap-8 relative overflow-hidden">
                                    <div className="absolute right-[-30px] top-[-30px] opacity-10 pointer-events-none">
                                        <img src={logoUrl} className="w-64 h-64 rotate-12" />
                                    </div>
                                    <div className="flex items-center gap-6 z-10">
                                        <img src={logoUrl} className="w-20 h-20 rounded-full border-4 border-pink-50 shadow-md" />
                                        <div>
                                            <h2 className="text-4xl font-black text-slate-900 leading-tight">Halo, <span className="text-rose-500">Chef!</span> ✨</h2>
                                            <p className="text-slate-400 font-medium text-lg">Ada kreasi manis apa hari ini?</p>
                                        </div>
                                    </div>
                                    <div className="relative group w-full md:w-80 z-10">
                                        <Icon name="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-pink-300" />
                                        <input 
                                            type="text" 
                                            placeholder="Cari koleksi resep..." 
                                            className="w-full pl-12 pr-6 py-4 bg-pink-50/50 border border-pink-100 rounded-full outline-none focus:ring-4 focus:ring-pink-500/10 transition-all font-medium"
                                            value={searchQuery}
                                            onChange={(e) => setSearchQuery(e.target.value)}
                                        />
                                    </div>
                                </header>

                                {filteredRecipes.length > 0 ? (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                        {filteredRecipes.map(recipe => (
                                            <div key={recipe.id} onClick={() => { setSelectedRecipe(recipe); setView('detail'); }} className="group bg-white rounded-[2.5rem] overflow-hidden border border-pink-50 shadow-md hover:shadow-2xl hover:-translate-y-2 transition-all cursor-pointer flex flex-col h-full">
                                                <div className="aspect-square bg-pink-50 relative overflow-hidden">
                                                    {recipe.imageUrl ? (
                                                        <img src={recipe.imageUrl} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                                                    ) : (
                                                        <div className="w-full h-full flex items-center justify-center text-pink-200">
                                                            <Icon name="utensils" size={64} />
                                                        </div>
                                                    )}
                                                    <div className="absolute top-5 left-5 bg-white/90 backdrop-blur px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest text-rose-500 shadow-sm">{recipe.category}</div>
                                                </div>
                                                <div className="p-8 flex-1 flex flex-col gap-4">
                                                    <h3 className="text-xl font-black text-slate-900 group-hover:text-rose-500 transition-colors line-clamp-1 italic">{recipe.title}</h3>
                                                    <div className="flex gap-3 text-slate-400 text-xs font-bold">
                                                        <span className="bg-rose-50 text-rose-500 px-3 py-1 rounded-full flex items-center gap-1"><Icon name="clock" size={14} /> {recipe.prepTime}m</span>
                                                        <span className="bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full flex items-center gap-1"><Icon name="wallet" size={14} /> {formatIDR(recipe.budget)}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="bg-white rounded-[3rem] p-20 text-center border-2 border-dashed border-pink-100 space-y-6">
                                        <div className="bg-pink-50 w-32 h-32 rounded-full flex items-center justify-center mx-auto grayscale opacity-40">
                                            <img src={logoUrl} className="w-full h-full object-contain p-4" />
                                        </div>
                                        <h3 className="text-2xl font-black text-slate-900">Buku Masih Kosong</h3>
                                        <p className="text-slate-400 font-medium">Ayo mulai catat mahakarya dapur Anda!</p>
                                        <button onClick={() => setView('add')} className="bg-pink-500 text-white px-10 py-4 rounded-full font-black shadow-xl shadow-pink-200">Mulai Menulis</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* VIEW: ADD */}
                        {view === 'add' && (
                            <div className="max-w-4xl mx-auto animate-fade-in bg-white rounded-[3rem] shadow-2xl overflow-hidden border border-pink-50 flex flex-col md:flex-row">
                                <div className="hidden md:flex w-1/3 bg-pink-500 p-12 flex-col justify-between text-white relative">
                                    <div className="opacity-10 absolute inset-0 pointer-events-none overflow-hidden">
                                        <img src={logoUrl} className="w-64 h-64 invert -ml-10 mt-10" />
                                    </div>
                                    <div className="relative z-10">
                                        <h2 className="text-4xl font-black leading-tight italic">Pink Edition <br/>Cookbook</h2>
                                        <p className="mt-4 font-medium text-pink-100 opacity-80">"Setiap resep adalah cerita manis."</p>
                                    </div>
                                    <div className="relative z-10 text-[10px] uppercase font-black tracking-[0.3em] opacity-60">Premium Dessert Archive</div>
                                </div>
                                <div className="flex-1 p-10 md:p-14 space-y-8 max-h-[85vh] overflow-y-auto custom-scrollbar">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="md:col-span-2 space-y-2">
                                            <label className="text-[10px] font-black uppercase tracking-widest text-pink-400">Judul Masakan</label>
                                            <input type="text" className="w-full px-6 py-4 bg-pink-50/30 border border-pink-100 rounded-2xl outline-none font-bold text-lg focus:border-pink-300" placeholder="Strawberry Cheesecake..." value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase tracking-widest text-pink-400">Budget (Rp)</label>
                                            <input type="number" className="w-full px-6 py-4 bg-pink-50/30 border border-pink-100 rounded-2xl outline-none font-bold" value={formData.budget} onChange={e => setFormData({...formData, budget: e.target.value})} />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase tracking-widest text-pink-400">Waktu (Menit)</label>
                                            <input type="number" className="w-full px-6 py-4 bg-pink-50/30 border border-pink-100 rounded-2xl outline-none font-bold" value={formData.prepTime} onChange={e => setFormData({...formData, prepTime: e.target.value})} />
                                        </div>
                                        <div className="md:col-span-2 flex flex-col gap-4">
                                            <div className="relative">
                                                <Icon name="link" className="absolute left-4 top-1/2 -translate-y-1/2 text-pink-300" size={16} />
                                                <input type="text" className="w-full pl-12 pr-6 py-4 bg-pink-50/30 border border-pink-100 rounded-2xl text-sm outline-none" placeholder="Link Sosmed (TikTok/IG)" value={formData.referenceUrl} onChange={e => setFormData({...formData, referenceUrl: e.target.value})} />
                                            </div>
                                            <button type="button" onClick={generateImage} disabled={isGeneratingImage} className="w-full py-4 bg-gradient-to-r from-rose-500 to-pink-500 text-white rounded-2xl font-black shadow-xl disabled:opacity-50 flex items-center justify-center gap-2">
                                                {isGeneratingImage ? <Icon name="loader-2" className="animate-spin" /> : <Icon name="sparkles" />}
                                                Generate AI Food Art
                                            </button>
                                        </div>
                                        <div className="md:col-span-2 space-y-2">
                                            <label className="text-[10px] font-black uppercase tracking-widest text-pink-400">Bahan-bahan</label>
                                            <textarea rows="3" className="w-full px-6 py-4 bg-pink-50/30 border border-pink-100 rounded-2xl outline-none font-medium resize-none" placeholder="Pisahkan dengan baris baru..." value={formData.ingredients} onChange={e => setFormData({...formData, ingredients: e.target.value})}></textarea>
                                        </div>
                                        <div className="md:col-span-2 space-y-2">
                                            <label className="text-[10px] font-black uppercase tracking-widest text-pink-400">Langkah</label>
                                            <textarea rows="3" className="w-full px-6 py-4 bg-pink-50/30 border border-pink-100 rounded-2xl outline-none font-medium resize-none" value={formData.steps} onChange={e => setFormData({...formData, steps: e.target.value})}></textarea>
                                        </div>
                                    </div>
                                    <button onClick={handleSaveRecipe} className="w-full bg-pink-600 text-white font-black py-5 rounded-3xl shadow-2xl flex items-center justify-center gap-3">
                                        <Icon name="save" /> Simpan Ke Buku Pink
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* VIEW: DETAIL (BOOK STYLE) */}
                        {view === 'detail' && selectedRecipe && (
                            <div className="animate-fade-in">
                                <div className="bg-white rounded-[2.5rem] shadow-2xl border border-pink-100 flex flex-col md:flex-row min-h-[700px] relative overflow-hidden">
                                    <div className="hidden md:block absolute left-1/2 top-0 bottom-0 w-8 -translate-x-1/2 book-spine z-10 pointer-events-none"></div>
                                    
                                    {/* Left Page */}
                                    <div className="w-full md:w-1/2 p-10 md:p-14 border-pink-50 md:border-r space-y-8 flex flex-col">
                                        <div className="flex justify-between">
                                            <span className="bg-rose-500 text-white px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest">{selectedRecipe.category}</span>
                                            <button className="text-pink-200 hover:text-rose-500"><Icon name="trash-2" size={24} /></button>
                                        </div>
                                        <div className="aspect-[4/3] rounded-[2.5rem] overflow-hidden shadow-2xl border-8 border-pink-50">
                                            {selectedRecipe.imageUrl ? <img src={selectedRecipe.imageUrl} className="w-full h-full object-cover" /> : <div className="w-full h-full bg-pink-50 flex items-center justify-center text-pink-200"><Icon name="image" size={80} /></div>}
                                        </div>
                                        <h2 className="text-4xl font-black text-slate-900 font-serif italic">{selectedRecipe.title}</h2>
                                        <div className="flex gap-6 py-6 border-b border-pink-50 text-slate-700 font-bold">
                                            <div className="flex items-center gap-2"><Icon name="clock" className="text-rose-500" /> {selectedRecipe.prepTime}m</div>
                                            <div className="flex items-center gap-2"><Icon name="wallet" className="text-emerald-500" /> {formatIDR(selectedRecipe.budget)}</div>
                                        </div>
                                        {selectedRecipe.referenceUrl && (
                                            <a href={selectedRecipe.referenceUrl} target="_blank" className="p-5 bg-pink-50 rounded-2xl flex items-center justify-between text-rose-600 font-black">
                                                <div className="flex items-center gap-3"><Icon name="external-link" /> Video Referensi</div>
                                                <Icon name="chevron-right" />
                                            </a>
                                        )}
                                    </div>

                                    {/* Right Page */}
                                    <div className="w-full md:w-1/2 p-10 md:p-14 space-y-12 max-h-[85vh] overflow-y-auto custom-scrollbar">
                                        <section className="space-y-6">
                                            <h3 className="text-2xl font-black text-rose-600 flex items-center gap-3 font-serif italic"><Icon name="utensils" /> Bahan-bahan</h3>
                                            <div className="space-y-3">
                                                {selectedRecipe.ingredients.split('\n').map((item, i) => item.trim() && (
                                                    <div key={i} className="flex items-center gap-4 p-4 bg-pink-50/50 rounded-2xl border border-pink-100 text-sm font-bold text-slate-700">
                                                        <div className="w-2 h-2 rounded-full bg-rose-400"></div>{item}
                                                    </div>
                                                ))}
                                            </div>
                                        </section>
                                        <section className="space-y-6">
                                            <h3 className="text-2xl font-black text-rose-600 flex items-center gap-3 font-serif italic"><Icon name="book" /> Cara Membuat</h3>
                                            <div className="space-y-6">
                                                {selectedRecipe.steps.split('\n').map((step, i) => step.trim() && (
                                                    <div key={i} className="flex gap-6">
                                                        <div className="w-10 h-10 rounded-full bg-rose-500 text-white flex items-center justify-center font-black flex-shrink-0">{i+1}</div>
                                                        <p className="text-slate-600 font-medium italic pt-2">{step}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </section>
                                    </div>
                                </div>
                                <div className="mt-8 text-center">
                                    <button onClick={() => setView('home')} className="px-12 py-4 bg-white text-rose-500 font-black rounded-full shadow-lg border border-pink-100">Tutup Buku</button>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="mt-20 text-center opacity-30 text-pink-300">
                        <div className="flex items-center justify-center gap-4 mb-4">
                            <Icon name="heart" size={16} />
                            <div className="w-12 h-[1px] bg-pink-300"></div>
                            <img src={logoUrl} className="w-8 h-8 grayscale" />
                            <div className="w-12 h-[1px] bg-pink-300"></div>
                            <Icon name="heart" size={16} />
                        </div>
                        <p className="text-[10px] font-black uppercase tracking-[0.4em]">Pink Book Archive • Pro Edition</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
